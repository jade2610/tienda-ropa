<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Aura Fashion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/carrito1.css">
    <style>
        body { background-color: #121212; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        .table-dark { --bs-table-bg: #1e1e1e; }
        footer { background: #1e1e1e; padding: 20px; border-top: 1px solid #333; }
        @media print { .modal-footer, .btn-close { display: none; } }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Aura Fashion</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
                    <li class="nav-item">
                        <a class="nav-link active" href="carrito.html">Carrito 🛒 (<span id="contador">0</span>)</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <h2 class="text-center fw-bold">Tu Carrito de Compras</h2>
        <div class="table-responsive">
            <table class="table table-dark table-hover text-center mt-4">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla"></tbody>
            </table>
        </div>

        <div class="text-end mt-4">
            <h4>Total a pagar: <span class="text-warning">S/. <span id="total">0</span></span></h4>
            <button class="btn btn-warning btn-lg px-5 mt-2 fw-bold" onclick="comprar()">Finalizar Compra</button>
        </div>
    </div>

    <div class="modal fade" id="modalBoleta" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-warning">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold">🧾 Boleta de Venta Electrónica</h5>
                    <button type="button" class="btn-close btn-close-white" onclick="cerrarYFinalizar()"></button>
                </div>
                <div class="modal-body" id="contenidoBoleta">
                    </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" onclick="cerrarYFinalizar()">Cerrar y Salir</button>
                    <button type="button" class="btn btn-warning fw-bold" onclick="window.print()">Imprimir Boleta</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-auto">
        <p class="mb-0">© 2025 Aura Fashion - Todos los derechos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        let tabla = document.getElementById("tabla");
        let totalGeneral = 0;

        function renderizarCarrito() {
            tabla.innerHTML = "";
            totalGeneral = 0;
            carrito.forEach((p, i) => {
                totalGeneral += p.precio;
                tabla.innerHTML += `
                <tr>
                    <td class="align-middle">${p.nombre}</td>
                    <td class="align-middle">S/. ${p.precio.toFixed(2)}</td>
                    <td class="align-middle">
                        <button class="btn btn-danger btn-sm" onclick="eliminar(${i})">Eliminar</button>
                    </td>
                </tr>`;
            });
            document.getElementById("total").innerText = totalGeneral.toFixed(2);
            document.getElementById("contador").innerText = carrito.length;
        }

        function eliminar(i) {
            carrito.splice(i, 1);
            localStorage.setItem("carrito", JSON.stringify(carrito));
            renderizarCarrito();
        }

        function comprar() {
            if (carrito.length > 0) {
                let fecha = new Date();
                let detalleHtml = `
                    <div class="text-center mb-3">
                        <h4 class="fw-bold mb-0">AURA FASHION</h4>
                        <small>RUC: 20601234567</small><br>
                        <small>Lima, Perú</small>
                    </div>
                    <hr class="border-secondary">
                    <div class="row small mb-3">
                        <div class="col-6 text-start"><strong>Fecha:</strong> ${fecha.toLocaleDateString()}</div>
                        <div class="col-6 text-end"><strong>Hora:</strong> ${fecha.toLocaleTimeString()}</div>
                    </div>
                    <table class="table table-dark table-sm border-secondary">
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th class="text-end">Monto</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${carrito.map(p => `
                                <tr>
                                    <td>${p.nombre}</td>
                                    <td class="text-end">S/. ${p.precio.toFixed(2)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <hr class="border-secondary">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h5">TOTAL A PAGAR:</span>
                        <span class="h4 text-warning">S/. ${totalGeneral.toFixed(2)}</span>
                    </div>
                    <p class="text-center mt-4 text-success small">¡Gracias por tu preferencia! ✅</p>
                `;

                document.getElementById("contenidoBoleta").innerHTML = detalleHtml;
                let myModal = new bootstrap.Modal(document.getElementById('modalBoleta'));
                myModal.show();
            } else {
                alert("El carrito está vacío. ⚠️");
            }
        }

        function cerrarYFinalizar() {
            localStorage.removeItem("carrito");
            window.location.href = "index.html"; 
        }

        // Inicializar vista
        renderizarCarrito();
    </script>
</body>
</html>
