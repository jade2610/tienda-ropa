<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        .sidebar { width: 260px; height: 100vh; position: fixed; top: 0; left: 0; background-color: #2C1A17; border-right: 3px solid #B23A48; padding-top: 20px; z-index: 1000; }
        .main-content { margin-left: 260px; padding: 20px; width: calc(100% - 260px); }
        .sidebar .nav-link { color: #FCF9F2 !important; padding: 15px 25px; border-radius: 0; font-weight: 400; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #B23A48; color: white !important; }
        .card { border-radius: 8px; }
    </style>
</head>
<body class="bg-light">

    <div class="sidebar">
        <div class="text-center pb-4 mb-4 border-bottom" style="border-color: rgba(240, 213, 215, 0.2) !important;">
            <h4 class="fw-bold mb-0 text-white" style="letter-spacing: 1px;">JVXF Panel</h4>
            <small class="text-muted fw-bold">ADMINISTRADOR</small>
        </div>
        <ul class="nav flex-column fs-6">
            <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" th:href="@{/productos}"><i class="bi bi-list-ul me-2"></i> Ver Inventario</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/productos/nuevo}"><i class="bi bi-plus-circle me-2"></i> Registrar Ropa</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/ventas}"><i class="bi bi-receipt me-2"></i> Historial Ventas</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/clientes}"><i class="bi bi-people me-2"></i> Base Clientes</a></li>
            <li class="nav-item mt-5 border-top" style="border-color: rgba(240, 213, 215, 0.2) !important;"><a class="nav-link text-warning" th:href="@{/}"><i class="bi bi-box-arrow-left me-2"></i> Salir al Catálogo</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="fw-bold" style="color: #422A26;">Inventario de Prendas</h2>
            <a th:href="@{/productos/nuevo}" class="btn btn-warning shadow-sm px-4">
                <i class="bi bi-plus-lg fw-bold"></i> Nueva Prenda
            </a>
        </div>

        <div class="card border-0 shadow-sm p-2 mb-3 bg-white">
            <div class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="small fw-bold text-muted">Género</label>
                    <select id="filtroGenero" class="form-select form-select-sm" onchange="aplicarFiltros()">
                        <option value="">Todos</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Masculino">Masculino</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="small fw-bold text-muted">Tipo</label>
                    <select id="filtroTipo" class="form-select form-select-sm" onchange="aplicarFiltros()">
                        <option value="">Todos</option>
                        <option value="Polos">Polos</option>
                        <option value="Pantalones">Pantalones</option>
                        <option value="Casacas">Casacas</option>
                        <option value="Sueteres">Suéteres</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="small fw-bold text-muted">Búsqueda</label>
                    <input type="text" id="buscador" class="form-control form-control-sm" placeholder="🔍 Buscar por nombre o descripción..." onkeyup="aplicarFiltros()">
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm p-3 bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light text-muted small uppercase">
                        <tr>
                            <th>ID</th><th>Imagen</th><th>Prenda / Descripción</th><th>Género</th><th>Tipo</th><th>Talla</th><th>Stock</th><th>Precio</th><th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <tr th:each="p : ${listaProductos}" class="fila-producto">
                            <td class="fw-bold text-muted" th:text="${p.id}">1</td>
                            <td><img th:src="${p.imagenUrl}" class="rounded shadow-sm border" style="width: 45px; height: 55px; object-fit: cover;"></td>
                            <td>
                                <div class="fw-bold" style="color: #422A26;" th:text="${p.nombre}">Nombre</div>
                                <small class="text-muted" th:text="${p.description}">Desc</small>
                            </td>
                            <td><span class="badge" th:classappend="${p.genero == 'Femenino' ? 'bg-info' : 'bg-primary'}" th:text="${p.genero}">Gen</span></td>
                            <td><span class="badge bg-secondary" th:text="${p.tipo}">Tipo</span></td>
                            <td><span class="badge bg-dark" th:text="${p.talla}">M</span></td>
                            <td><span th:text="${p.stock}" th:class="${p.stock < 5 ? 'text-danger fw-bold' : ''}">0</span></td>
                            <td class="fw-bold text-success" th:text="'S/ ' + ${#numbers.formatDecimal(p.precio, 1, 2)}">0.00</td>
                            <td class="text-center">
                                <a th:href="@{/productos/editar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-dark"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/productos/eliminar/{id}(id=${p.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Seguro?');"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function aplicarFiltros() {
            const busqueda = document.getElementById("buscador").value.toLowerCase();
            const genSel = document.getElementById("filtroGenero").value.toLowerCase();
            const tipoSel = document.getElementById("filtroTipo").value.toLowerCase();
            const filas = document.querySelectorAll(".fila-producto");

            filas.forEach(fila => {
                const generoFila = fila.children[3].textContent.toLowerCase();
                const tipoFila = fila.children[4].textContent.toLowerCase();
                const textoFila = fila.textContent.toLowerCase();

                const coincide = textoFila.includes(busqueda) && 
                              (genSel === "" || generoFila.includes(genSel)) && 
                              (tipoSel === "" || tipoFila.includes(tipoSel));
                
                fila.style.display = coincide ? "" : "none";
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
