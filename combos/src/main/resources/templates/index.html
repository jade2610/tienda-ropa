<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JVXF Boutique | Estilo y Elegancia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <style>
        /* Hero con video de fondo */
        .hero { position: relative; height: 80vh; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        .video-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        /* Menú lateral elegante y LUMINOSO */
        .offcanvas { 
            width: 350px !important; 
            background-color: rgba(252, 249, 242, 0.95) !important; 
            backdrop-filter: blur(20px); 
            border-left: 1px solid rgba(178, 58, 72, 0.2);
            color: #422A26 !important;
        }
        .offcanvas .nav-link { 
            color: #422A26 !important; 
            font-size: 1.3rem; 
            font-weight: 600; 
            padding: 1.5rem 2rem !important; 
            transition: 0.4s; 
            border-bottom: 1px solid rgba(66, 42, 38, 0.08); 
        }
        .offcanvas .nav-link:hover { 
            background-color: rgba(178, 58, 72, 0.05);
            color: #B23A48 !important; 
            padding-left: 30px !important; 
        }
        .btn-close { filter: invert(20%); }
    </style>
</head>

<body>

<nav class="navbar fixed-top bg-white py-3 border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold text-dark" th:href="@{/}">JVXF <span class="text-danger">BOUTIQUE</span></a>
        
        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
            <i class="bi bi-list fs-2 text-dark"></i>
        </button>
    </div>
</nav>

<div class="offcanvas offcanvas-end" id="menuLateral">
    <div class="offcanvas-header pt-4">
        <h5 class="offcanvas-title fw-bold" style="color: #B23A48;">MENÚ</h5>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column justify-content-center">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" th:href="@{/}">INICIO</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/catalogo}">CATÁLOGO</a></li>
            <li class="nav-item"><a class="nav-link" th:href="@{/carrito/ver}">CARRITO</a></li>
            <li class="nav-item mt-4"><a class="nav-link text-danger" th:href="@{/admin/login}">PANEL ADMIN</a></li>
        </ul>
    </div>
</div>

<section class="hero text-center">
    <video autoplay muted loop playsinline class="video-background">
        <source src="https://player.vimeo.com/external/371587391.hd.mp4?s=4f777174e92a2a079f9024c08479904797143973&profile_id=175" type="video/mp4">
    </video>
    <div class="container">
        <h1 class="display-1 fw-bold text-uppercase">JVXF Boutique</h1>
        <p class="fs-3 mt-3">Elegancia, estilo y personalidad.</p>
        <a th:href="@{/catalogo}" class="btn btn-warning btn-lg mt-4 px-5 py-3">EXPLORAR COLECCIÓN</a>
    </div>
</section>

<section class="container py-5 text-center">
    <h2 class="fw-bold mb-5">Tendencias Destacadas</h2>
    <div class="row g-4">
        <div class="col-md-4"><div class="card p-4 border-0 shadow-sm"><h1>👗</h1><h5 class="fw-bold">Moda Exclusiva</h5></div></div>
        <div class="col-md-4"><div class="card p-4 border-0 shadow-sm"><h1>✨</h1><h5 class="fw-bold">Elegancia Premium</h5></div></div>
        <div class="col-md-4"><div class="card p-4 border-0 shadow-sm"><h1>👜</h1><h5 class="fw-bold">Estilo Urbano</h5></div></div>
    </div>
</section>

<footer class="text-center py-4 mt-auto border-top" style="background-color: #2C1A17; color: #FCF9F2 !important;">
    <p class="mb-0">© 2026 JVXF Boutique - Todos los derechos reservados</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
