<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    
    <style>
        /* Estilo para las tarjetas (Añade esto a tu archivo CSS o aquí) */
        .product-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 30px rgba(0,0,0,0.1) !important; }
        .product-card img { transition: transform 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar bg-white shadow-sm mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" th:href="@{/}">
                <i class="bi bi-arrow-left me-2"></i> Volver al Inicio
            </a>
            <a class="nav-link text-dark fw-bold" th:href="@{/carrito/ver}">
                <i class="bi bi-cart3 fs-4"></i> Mi Carrito
            </a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold display-4">Nuestra Colección</h1>
            <p class="text-muted lead">Encuentra la prenda perfecta para tu estilo</p>
        </div>

        <div class="d-flex justify-content-center gap-3 mb-5">
            <select id="filtroGenero" class="form-select border-0 shadow-sm" style="width: 180px; border-radius: 30px;" onchange="filtrar()">
                <option value="todos">Género: Todos</option>
                <option value="femenino">Femenino</option>
                <option value="masculino">Masculino</option>
            </select>
            <select id="filtroTipo" class="form-select border-0 shadow-sm" style="width: 180px; border-radius: 30px;" onchange="filtrar()">
                <option value="todos">Tipo: Todos</option>
                <option value="polos">Polos</option>
                <option value="pantalones">Pantalones</option>
                <option value="casacas">Casacas</option>
                <option value="sueteres">Suéteres</option>
            </select>
        </div>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="catalogoProductos">
            <div th:each="producto : ${listaProductos}" 
                 class="col producto-card" 
                 th:data-genero="${producto.genero != null ? producto.genero.toLowerCase() : ''}" 
                 th:data-tipo="${producto.tipo != null ? producto.tipo.toLowerCase() : ''}">
                
                <div class="card h-100 border-0 shadow-sm overflow-hidden product-card">
                    <div class="overflow-hidden">
                        <img th:src="${producto.imagenUrl}" class="card-img-top" style="height: 350px; object-fit: cover;" alt="Ropa">
                    </div>
                    <div class="card-body text-center d-flex flex-column">
                        <h5 class="fw-bold mb-1" th:text="${producto.nombre}">Nombre</h5>
                        <p class="text-muted small mb-3" th:text="${producto.description}">Descripción</p>
                        <span class="badge bg-light text-dark border mb-3 w-auto mx-auto" th:text="'Talla: ' + ${producto.talla}">Talla</span>
                        <h4 class="fw-bold text-danger mt-auto mb-3" th:text="'S/ ' + ${#numbers.formatDecimal(producto.precio, 1, 2)}">S/ 0.00</h4>
                        <form th:action="@{/carrito/agregar/{id}(id=${producto.id})}" method="POST">
                            <button type="submit" class="btn btn-dark rounded-pill px-4 w-100">
                                <i class="bi bi-cart-plus"></i> Añadir
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function filtrar() {
            const generoSel = document.getElementById('filtroGenero').value.toLowerCase();
            const tipoSel = document.getElementById('filtroTipo').value.toLowerCase();
            const cards = document.querySelectorAll('.producto-card');

            cards.forEach(card => {
                const g = card.getAttribute('data-genero');
                const t = card.getAttribute('data-tipo');
                const matchGenero = (generoSel === 'todos' || g === generoSel);
                const matchTipo = (tipoSel === 'todos' || t === tipoSel);
                // Usamos 'd-flex' para que Bootstrap mantenga el diseño, o 'block'
                card.style.display = (matchGenero && matchTipo) ? 'block' : 'none';
            });
        }
    </script>

    <footer class="text-center py-4 mt-auto border-top" style="background-color: #2C1A17; color: #FCF9F2 !important;">
        <p class="mb-0">© 2026 JVXF Boutique - Todos los derechos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
