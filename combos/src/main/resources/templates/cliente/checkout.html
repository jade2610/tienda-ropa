<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago - JVXF Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .qr-img { max-width: 150px; display: block; margin: 10px auto; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar bg-white shadow-sm mb-5 py-3">
        <div class="container d-flex justify-content-center">
            <a class="navbar-brand fw-bold text-dark fs-3" th:href="@{/}">
                <i class="bi bi-shield-lock-fill text-success"></i> Pago Seguro - JVXF Boutique
            </a>
        </div>
    </nav>

    <div class="container pb-5 flex-grow-1">
        <div class="mb-4">
            <a th:href="@{/carrito/ver}" class="text-decoration-none text-dark fw-bold">
                <i class="bi bi-arrow-left"></i> Volver al Carrito
            </a>
        </div>

        <div class="row g-5">
            <div class="col-lg-7">
                <form th:action="@{/carrito/procesar}" method="POST">
                    <div class="card border-0 shadow-sm p-4 mb-4">
                        <h5 class="fw-bold mb-3"><i class="bi bi-person-badge"></i> 1. Datos de Contacto</h5>
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label fw-bold">Nombre Completo</label><input type="text" class="form-control" name="nombre" required></div>
                            <div class="col-md-6"><label class="form-label fw-bold">Correo Electrónico</label><input type="email" class="form-control" name="email" required></div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm p-4 mb-4">
                        <h5 class="fw-bold mb-4"><i class="bi bi-wallet2"></i> 2. Método de Pago</h5>
                        <div class="form-check border rounded p-3 mb-3 bg-white" onclick="mostrarPago('tarjeta')">
                            <input class="form-check-input ms-1" type="radio" name="metodoPago" id="radioTarjeta" value="Tarjeta" checked>
                            <label class="form-check-label ms-2 w-100 fw-bold" style="cursor: pointer;">Tarjeta de Crédito / Débito</label>
                            <div id="formTarjeta" class="mt-3">
                                <input type="text" class="form-control mb-2" placeholder="Número de tarjeta">
                                <div class="row g-2"><div class="col-6"><input type="text" class="form-control" placeholder="MM/AA"></div><div class="col-6"><input type="text" class="form-control" placeholder="CVV"></div></div>
                            </div>
                        </div>

                        <div class="form-check border rounded p-3 bg-white" onclick="mostrarPago('billetera')">
                            <input class="form-check-input ms-1" type="radio" name="metodoPago" id="radioBilletera" value="Yape/Plin">
                            <label class="form-check-label ms-2 fw-bold w-100" style="cursor: pointer;">Pago con Yape / Plin</label>
                            <div id="formBilletera" class="mt-3 text-center d-none border-top pt-3">
                                <select class="form-select form-select-sm mb-2" onchange="cambiarQR(this.value)">
                                    <option value="">Selecciona tu app...</option>
                                    <option value="yape">Yape</option>
                                    <option value="plin">Plin</option>
                                </select>
                                <img th:src="@{/img/yape.png}" id="qrYape" class="qr-img border p-1 rounded d-none" alt="QR Yape">
                                <img th:src="@{/img/plin.png}" id="qrPlin" class="qr-img border p-1 rounded d-none" alt="QR Plin">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-dark btn-lg w-100 py-3 fw-bold shadow">Confirmar y Generar Boleta</button>
                </form>
            </div>

            <div class="col-lg-5">
                <div class="card border-0 shadow-sm p-4 bg-white sticky-top" style="top: 20px;">
                    <h5 class="fw-bold mb-4">Resumen de tu Orden</h5>
                    <ul class="list-group list-group-flush mb-4">
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0 py-3" th:each="detalle : ${detalles}">
                            <span th:text="${detalle.producto.nombre}"></span>
                            <span class="text-muted" th:text="'S/ ' + ${#numbers.formatDecimal(detalle.precioUnitario * detalle.cantidad, 1, 2)}"></span>
                        </li>
                    </ul>
                    <div class="d-flex justify-content-between align-items-center"><h4 class="fw-bold">Total</h4><h2 class="fw-bold text-success" th:text="'S/ ' + ${#numbers.formatDecimal(total, 1, 2)}"></h2></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function mostrarPago(metodo) {
            document.getElementById('formTarjeta').classList.toggle('d-none', metodo !== 'tarjeta');
            document.getElementById('formBilletera').classList.toggle('d-none', metodo !== 'billetera');
        }

        function cambiarQR(app) {
            document.getElementById('qrYape').classList.add('d-none');
            document.getElementById('qrPlin').classList.add('d-none');
            if(app === 'yape') document.getElementById('qrYape').classList.remove('d-none');
            if(app === 'plin') document.getElementById('qrPlin').classList.remove('d-none');
        }
    </script>
</body>
</html>
