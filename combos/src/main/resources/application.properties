# 1. Configuración de conexión a MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_ropa?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de JPA / Hibernate (Genera/Actualiza tablas automáticamente)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Desactivar el caché de Thymeleaf para ver los cambios de diseño al instante
spring.thymeleaf.cache=false