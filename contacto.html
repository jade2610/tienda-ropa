<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Aura Fashion</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/contacto.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Aura Fashion</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="carrito.html">
                            Carrito 🛒 (<span id="contador">0</span>)
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 flex-grow-1">
        <h2 class="fw-bold">Contáctanos</h2>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-dark text-white p-4 shadow">
                    <form id="formContacto">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" placeholder="Tu nombre completo" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mensaje</label>
                            <textarea class="form-control" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold">Enviar Mensaje</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-auto">
        <p class="mb-0">© 2025 Aura Fashion - Todos los derechos reservados</p>
    </footer>

    <script>
        // Actualizar carrito
        let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        document.getElementById("contador").innerText = carrito.length;

        // Envío de formulario
        document.getElementById("formContacto").addEventListener("submit", function(e) {
            e.preventDefault();
            alert("¡Gracias por escribirnos! Te responderemos pronto. 📩");
            this.reset();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
